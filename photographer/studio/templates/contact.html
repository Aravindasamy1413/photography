<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>

/* 🌈 Background */
body {
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
}

/* 📦 Container */
.container {
    max-width: 600px;
}

/* ✨ Title Animation */
h2 {
    font-weight: bold;
    animation: fadeIn 1s ease-in-out;
}

/* 🔘 Button Base */
.btn {
    padding: 14px;
    font-size: 16px;
    border-radius: 12px;
    font-weight: 600;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

/* 📞 Call Button */
.btn-primary {
    background: linear-gradient(45deg, #007bff, #00c6ff);
    border: none;
}

/* 💬 WhatsApp Button */
.btn-success {
    background: linear-gradient(45deg, #25D366, #128C7E);
    border: none;
}

/* 📧 Email Button */
.btn-secondary {
    background: linear-gradient(45deg, #6c757d, #343a40);
    border: none;
}

/* 🔥 Button Hover Effect */
.btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ✨ Shine Animation */
.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
}

.btn:hover::before {
    left: 100%;
}

/* 📍 Card Glass Effect */
.card {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    border: none;
    animation: slideUp 0.8s ease;
}

/* 🗺 Map Styling */
iframe {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* 🎬 Animations */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
<body>

<div class="container mt-5">
    <h2 class="text-center">Contact Us</h2>

    <div class="d-flex flex-column gap-3 mt-3">

    <!-- 📞 Call -->
    <a href="tel: +910123456789" class="btn btn-primary w-100 mb-2">
    📞 Call Now +910123456789
    </a>

    <!-- 💬 WhatsApp -->
    <a href="https://wa.me/910123456789" class="btn btn-success w-100">
        💬 WhatsApp
    </a>

    <!-- 📧 Email -->
    <a href="https://mail.google.com/mail/?view=cm&fs=1&to=lJX22@gmail.com" 
       target="_blank" class="btn btn-secondary w-100">
        📧 Email
    </a>

</div>
<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-3">📍 Visit Our Studio</h3>

        <p class="text-center">
            Professional Studio,<br>
            No:305, velachery Main Road, Chennai, kanchipuram distric,<br>
            Tamil Nadu
        </p>

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3887.940117724499!2d80.22079599999999!3d12.9756819!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a525d9078262943%3A0x1de7f90a06350d8a!2sVijaya%20Nagar%20Bus%20Terminus%20(Velachery)!5e0!3m2!1sen!2sin!4v1776090119182!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
</div>
</div>

</body>
</html>
