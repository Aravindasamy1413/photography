<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 🔥 Image Zoom Effect */
        .card img {
            transition: transform 0.3s;
            cursor: pointer;
        }

        .card img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">📸 Our Gallery</h2>

    <!-- 🔥 CATEGORY FILTER -->
    <div class="text-center mb-4">
        <a href="/gallery/" class="btn btn-dark">All</a>
        <a href="/gallery/?category=Wedding" class="btn btn-primary">
    Wedding & Reception
</a>
        <a href="/gallery/?category=Birthday" class="btn btn-success">Birthday</a>
        <a href="/gallery/?category=Baby" class="btn btn-warning">Baby</a>
        <a href="/gallery/?category=outdoor" class="btn btn-success">Outdoor</a>

    </div>

    <div class="row">
        {% for photo in photos %}
        <div class="col-md-4 mb-4">
            <div class="card shadow">

                <!-- 🔥 Click → Lightbox -->
                <img src="{{ photo.image.url }}" class="card-img-top"
                     style="height:250px; object-fit:cover;"
                     data-bs-toggle="modal" data-bs-target="#imageModal{{ photo.id }}">

                <div class="card-body text-center">
                    <h5>{{ photo.title }}</h5>
                    <p>{{ photo.category }}</p>
                </div>
            </div>
        </div>

        <!-- 🔥 LIGHTBOX MODAL -->
        <div class="modal fade" id="imageModal{{ photo.id }}">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-body text-center">
                        <img src="{{ photo.image.url }}" class="img-fluid">
                    </div>
                </div>
            </div>
        </div>

        {% endfor %}
    </div>
</div>

<!-- 🔥 Bootstrap JS (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
