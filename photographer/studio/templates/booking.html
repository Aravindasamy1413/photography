<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>

/* 🌈 Background Gradient */
body {
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
}

/* 📦 Center Container */
.container {
    max-width: 520px;
}

/* 🧾 Glass Form Card */
form {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    animation: fadeIn 0.8s ease-in-out;
}

/* ✨ Title */
h2 {
    font-weight: bold;
    color: #333;
}

/* 🔥 Input Fields */
.form-control {
    border-radius: 10px;
    border: none;
    padding: 12px;
    background: rgba(255,255,255,0.8);
    transition: all 0.3s ease;
}

/* Focus Effect */
.form-control:focus {
    background: #fff;
    box-shadow: 0 0 10px rgba(0,123,255,0.4);
    transform: scale(1.02);
}

/* 📅 Date & Time Special */
input[type="date"],
input[type="time"] {
    cursor: pointer;
}

/* 🚀 Button Style */
.btn-primary {
    background: linear-gradient(45deg, #007bff, #00c6ff);
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    transition: 0.3s;
}

/* Hover Glow */
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,123,255,0.5);
}

/* ✨ Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
<body>

<div class="container mt-5">
    <h2 class="text-center">Book Your Event 📅</h2>

    <form method="POST" class="mt-4">
        {% csrf_token %}

        <input class="form-control mb-3" type="text" name="name" placeholder="Name" required>
        <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
        <input class="form-control mb-3" type="text" name="phone" placeholder="Phone" required>
        <input class="form-control mb-3" type="text" name="event_type" placeholder="Event Type" required>
        <input class="form-control mb-3" type="date" name="date" required>
        <input class="form-control mb-3" type="text" name="location" placeholder="Location" required>
        <input type="time" name="start_time" class="form-control mb-3" required>
        <button class="btn btn-primary w-100">Book Now</button>
    </form>
</div>

</body>
</html>
