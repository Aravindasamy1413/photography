<!DOCTYPE html>
<html>
<head>
    <title>Selvi Studio 📸</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #ffffff);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .btn {
            border-radius: 10px;
        }

        .btn:hover {
            transform: scale(1.03);
            transition: 0.2s;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark p-3">
    <div class="container">
        <h4 class="text-white">📸 Selvi Studio</h4>

        <div>
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/booking/" class="btn btn-outline-light me-2">Event</a>
            <a href="/frame-order/" class="btn btn-outline-light me-2">Frame</a>
            <a href="/contact/" class="btn btn-outline-light">Contact</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Success Message -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success text-center">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
